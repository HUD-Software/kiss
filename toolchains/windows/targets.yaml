targets:
  x86_64-pc-windows-msvc:
    arch: x86_64 # x86_64, i686, aarch64, arm
    vendor: pc # pc, unknown
    os: windows # windows, linux, macos, none
    abi: msvc # msvc, gnu, musl, none
    pointer-width: 64 # 32 or 64
    endianness: little # or big
    supported-compilers: [clangcl, cl]
    compilers:
      enable-features: [TARGET_X64]

  i686-pc-windows-msvc:
    arch: i686 # x86_64, i686, aarch64, arm
    vendor: pc # pc, unknown
    os: windows # windows, linux, macos, none
    abi: msvc # msvc, gnu, musl, none
    pointer-width: 32 # 32 or 64
    endianness: little # or big
    supported-compilers: [clangcl, cl] # List of supported compilers
    compilers:
      enable-features: [TARGET_X86] # Feature enabled for all supported compilers
      cxx-linker-flags: [] # Linker flags enabled for all supported compilers
      cxx-compiler-flags: [] # Compiler flags enabled for all supported compilers
      clangcl: # For clangcl compilers
        features:
          - name: ASAN # For ASAN feature
            cxx-linker-flags: ["/link msvcrt.lib"] # mscvrt.lib is needed for i868 target
